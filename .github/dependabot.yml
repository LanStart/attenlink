# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "CI/CD"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Dart/Flutter dependencies (pubspec.yaml)
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "build"
      include: "scope"
    # Allow direct updates for minor/patch versions
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
