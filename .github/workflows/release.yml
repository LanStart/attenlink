name: Build and Release AttenLink

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: apk
            build_cmd: flutter build apk --release
            artifact_name: app-release.apk
            artifact_path: build/app/outputs/flutter-apk/app-release.apk
          - os: ubuntu-latest
            target: linux
            build_cmd: |
              sudo apt-get update -y
              sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
              flutter build linux --release
              cd build/linux/x64/release/bundle
              tar -czvf ../../../../../attenlink-linux.tar.gz *
            artifact_name: attenlink-linux.tar.gz
            artifact_path: attenlink-linux.tar.gz
          - os: windows-latest
            target: windows
            build_cmd: flutter build windows --release
            artifact_name: attenlink-windows.zip
            artifact_path: build/windows/x64/runner/Release/*
          - os: macos-latest
            target: macos
            build_cmd: flutter build macos --release
            artifact_name: attenlink-macos.app
            artifact_path: build/macos/Build/Products/Release/attenlink.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.target == 'apk'
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Extract Version
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "run_number=$GITHUB_RUN_NUMBER" >> $GITHUB_OUTPUT
          
          # Handle sed differences between GNU sed (Linux) and BSD sed (macOS)
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/^version: .*/version: $VERSION+$GITHUB_RUN_NUMBER/g" pubspec.yaml
          else
            sed -i "s/^version: .*/version: $VERSION+$GITHUB_RUN_NUMBER/g" pubspec.yaml
          fi
        shell: bash

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Create Native Platforms (if missing)
        run: flutter create .
        shell: bash

      - name: Build
        run: ${{ matrix.build_cmd }}
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Windows
        run: |
          cd artifacts/attenlink-windows.zip
          zip -r ../../attenlink-windows.zip .
          cd ../..

      - name: Zip MacOS
        run: |
          cd artifacts/attenlink-macos.app
          zip -r ../../attenlink-macos.zip .
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/app-release.apk/app-release.apk
            artifacts/attenlink-linux.tar.gz/attenlink-linux.tar.gz
            attenlink-windows.zip
            attenlink-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
