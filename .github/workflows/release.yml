name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.1)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.x'

jobs:
  prepare:
    name: Prepare Environment
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Extract version info
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if [[ "${TAG}" == *"alpha"* || "${TAG}" == *"beta"* || "${TAG}" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build for ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            build_cmd: flutter build apk --release --split-per-abi
            artifact_path: build/app/outputs/flutter-apk/*.apk
          - platform: ios
            os: macos-latest
            build_cmd: flutter build ios --release --no-codesign
            artifact_path: build/ios/ipa/*.ipa
          - platform: windows
            os: windows-latest
            build_cmd: flutter build windows --release
            artifact_path: build/windows/x64/runner/Release/*
          - platform: linux
            os: ubuntu-latest
            build_cmd: flutter build linux --release
            artifact_path: build/linux/x64/release/bundle/*
          - platform: macos
            os: macos-latest
            build_cmd: flutter build macos --release
            artifact_path: build/macos/Build/Products/Release/attenlink.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev ninja-build

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner (Required for Isar)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build ${{ matrix.platform }}
        run: ${{ matrix.build_cmd }}

      - name: Package Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $zipName = "AttenLink-${{ needs.prepare.outputs.tag }}-windows-x64.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          tarName="AttenLink-${{ needs.prepare.outputs.tag }}-linux-x64.tar.gz"
          tar -czf "$tarName" -C build/linux/x64/release/bundle .
          echo "TAR_NAME=$tarName" >> $GITHUB_ENV

      - name: Package macOS
        if: matrix.platform == 'macos'
        run: |
          zipName="AttenLink-${{ needs.prepare.outputs.tag }}-macos.zip"
          ditto -c -k --keepParent "build/macos/Build/Products/Release/attenlink.app" "$zipName"
          echo "MAC_ZIP=$zipName" >> $GITHUB_ENV

      - name: Package iOS
        if: matrix.platform == 'ios'
        run: |
          zipName="AttenLink-${{ needs.prepare.outputs.tag }}-ios-ipa.zip"
          if [ -d "build/ios/ipa" ]; then
            cd build/ios/ipa && zip -r "../../$zipName" . && cd ../..
          else
            # If no .ipa, package the .app
            cd build/ios/iphoneos && mkdir -p Payload && cp -r *.app Payload/ && zip -r "../../../../$zipName" Payload && cd ../../../..
          fi
          echo "IOS_ZIP=$zipName" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            *.zip
            *.tar.gz

  publish:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          pattern: release-*

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./artifacts/**/*"
          tag: ${{ needs.prepare.outputs.tag }}
          name: "AttenLink ${{ needs.prepare.outputs.tag }}"
          draft: true
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
