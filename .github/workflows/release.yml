name: Build and Release AttenLink

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: apk
            build_cmd: |
              flutter build apk --release
              mv build/app/outputs/flutter-apk/app-release.apk attenlink-android.apk
            artifact_name: attenlink-android.apk
            artifact_path: attenlink-android.apk
          - os: ubuntu-latest
            target: linux
            build_cmd: |
              sudo apt-get update -y
              sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
              flutter config --enable-linux-desktop
              flutter build linux --release
            artifact_name: attenlink-linux.tar.gz
            artifact_path: attenlink-linux.tar.gz
          - os: windows-latest
            target: windows
            build_cmd: flutter build windows --release
            artifact_name: attenlink-windows.zip
            artifact_path: attenlink-windows.zip
          - os: macos-latest
            target: macos
            build_cmd: flutter build macos --release
            artifact_name: attenlink-macos.zip
            artifact_path: attenlink-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.target == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Extract Version
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "run_number=$GITHUB_RUN_NUMBER" >> $GITHUB_OUTPUT
          sed -i "s/^version: .*/version: $VERSION+$GITHUB_RUN_NUMBER/g" pubspec.yaml
        shell: bash

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Create Native Platforms (if missing)
        run: flutter create .
        shell: bash

      - name: Build
        run: ${{ matrix.build_cmd }}
        shell: bash

      - name: Package Linux
        if: matrix.target == 'linux'
        run: |
          cd build/linux/x64/release
          mv bundle attenlink
          tar -czvf ../../../../attenlink-linux.tar.gz attenlink
        shell: bash

      - name: Package Windows
        if: matrix.target == 'windows'
        run: |
          Rename-Item -Path build\windows\x64\runner\Release -NewName attenlink
          Compress-Archive -Path build\windows\x64\runner\attenlink -DestinationPath attenlink-windows.zip
        shell: pwsh

      - name: Package macOS
        if: matrix.target == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent attenlink.app ../../../../../attenlink-macos.zip
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          generate_release_notes: true
