name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Label based on changed paths
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

      - name: Label based on PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];

            if (title.startsWith('feat') || title.startsWith('feature')) {
              labels.push('enhancement');
            } else if (title.startsWith('fix') || title.startsWith('bugfix')) {
              labels.push('bug');
            } else if (title.startsWith('docs')) {
              labels.push('documentation');
            } else if (title.startsWith('refactor')) {
              labels.push('refactor');
            } else if (title.startsWith('perf') || title.startsWith('performance')) {
              labels.push('performance');
            } else if (title.startsWith('test')) {
              labels.push('testing');
            } else if (title.startsWith('chore') || title.startsWith('ci')) {
              labels.push('chore');
            } else if (title.startsWith('breaking')) {
              labels.push('breaking change');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
