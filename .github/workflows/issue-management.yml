name: Issue Management

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Close stale issues
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 30
          days-before-issue-close: 7
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          close-issue-label: "closed-stale"
          close-pr-label: "closed-stale"
          stale-issue-message: |
            此 Issue 已有 30 天没有动态，已被标记为陈旧。如果此 Issue 在 7 天内没有更多动态（评论等），将被自动关闭。
            如需保持此 Issue 开放，请添加评论或移除 `stale` 标签。
          stale-pr-message: |
            此 Pull Request 已有 30 天没有动态，已被标记为陈旧。如果此 Pull Request 在 7 天内没有更多动态，将被自动关闭。
            如需保持此 Pull Request 开放，请添加评论或移除 `stale` 标签。
          close-issue-message: |
            此 Issue 因长时间无动态已被自动关闭。如果问题仍然存在，请重新打开此 Issue 或创建新的 Issue。
          close-pr-message: |
            此 Pull Request 因长时间无动态已被自动关闭。如需继续此工作，请重新打开此 Pull Request。
          exempt-issue-labels: "pinned,security,enhancement,good first issue"
          exempt-pr-labels: "pinned,security"
